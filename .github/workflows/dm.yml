name: Auto DM Replies

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger for testing

permissions:
  contents: write

jobs:
  auto-dm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run auto-DM script
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: node src/dm.js

      - name: Commit updated processed list
        run: |
          git config user.name "klarvo-bot"
          git config user.email "bot@klarvo.ai"
          git add data/processed_comments.json
          git diff --staged --quiet || git commit -m "chore: update processed comments [skip ci]"
          git push
