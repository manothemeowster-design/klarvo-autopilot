name: Reply to Comments

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - run: npm install

      - run: node src/reply.js
        env:
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}

      - name: Save replied list
        run: |
          git config user.email "bot@klarvo.ai"
          git config user.name "Klarvo Bot"
          git add replied.json
          git diff --staged --quiet || git commit -m "update replied comments"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
